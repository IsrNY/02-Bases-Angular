<h1>{{name}}</h1>
<dl>
  <td>Nombre:</td>
  <dd>{{name}}</dd>
  <td>Edad:</td>
  <dd>{{age}}</dd>
  <td>Metodo:</td>
  <dd>{{getheroDescription()}}</dd>
  <td>CAPITALIZADO:</td>
  <dd>{{capitalizedName}}</dd>
</dl>
<button *ngIf="name!=='Spiterman'" (click)="changeName()" class="btn btn-success mx-2">Change Name</button>
<button *ngIf="name==='Spiterman' && age===30" (click)="resetValues()" class="btn btn-secondary">Reset Values</button>
<button *ngIf="age!==30" (click)="changeAge()" class="btn btn-warning mx-2">Change Age</button>
